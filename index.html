<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sound Safari</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">&#9654;</span>
        <span class="logo-text">Sound Safari</span>
      </div>
      <p class="tagline">Discover your next obsession</p>
    </div>
    <div class="header-stripe"></div>
  </header>

  <main class="main-content">

    <div id="loader" class="loader-wrap">
      <div class="loader-ring"></div>
      <p class="loader-text">Tuning in...</p>
    </div>

    <section id="app" class="app-section hidden">

      <div class="stats-bar">
        <span id="song-count" class="song-count"></span>
      </div>

      <div id="song-grid" class="song-grid"></div>

    </section>

  </main>

  <div id="player-bar" class="player-bar hidden">
    <img id="player-art" class="player-art" src="" alt="artwork" />
    <div class="player-info">
      <span id="player-title" class="player-title"></span>
      <span id="player-artist" class="player-artist"></span>
    </div>
    <audio id="audio-player" controls></audio>
    <button id="close-player" class="close-player" title="Close player">&#10005;</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
