<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sound Safari</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
    <div style="display:flex; align-items:center; gap: 16px;">
      <button id="back-btn" class="back-btn disabled" disabled title="Go Back">&#8592; Back</button>
      <button id="home-btn" class="home-btn" title="Go Home">🏠 Home</button>
      <div class="logo-wrap" style="display:flex; align-items:center;">
        <div class="logo">
          <span class="logo-icon">&#9654;</span>
          <span class="logo-text">Sound Safari</span>
        </div>
        <p class="tagline">Discover your next obsession</p>
      </div>
    </div>
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Dark/Light Mode" title="Toggle Theme">☀️</button>
    </div>
    <div class="header-stripe"></div>
  </header>

  <main class="main-content">

    <div id="loader" class="loader-wrap">
      <div class="loader-ring"></div>
      <p class="loader-text">Tuning in...</p>
    </div>

    <section id="app" class="app-section hidden">

      <div class="controls-bar">
        <div class="controls-wrap">
          <input type="text" id="search-input" class="control-input" placeholder="Search tracks or artists..." />
          <select id="genre-filter" class="control-select">
            <option value="all">All Genres</option>
          </select>
          <select id="sort-select" class="control-select">
            <option value="default">Default Order</option>
            <option value="title-asc">Title (A-Z)</option>
            <option value="title-desc">Title (Z-A)</option>
            <option value="artist-asc">Artist (A-Z)</option>
          </select>
          <button id="fav-toggle" class="control-btn toggle-fav-btn">❤️ Show Favorites</button>
        </div>
        <span id="song-count" class="song-count"></span>
      </div>

      <div id="song-grid" class="song-grid"></div>

    </section>

  </main>

  <div id="player-bar" class="player-bar hidden">
    <img id="player-art" class="player-art" src="" alt="artwork" />
    <div class="player-info">
      <span id="player-title" class="player-title"></span>
      <span id="player-artist" class="player-artist"></span>
    </div>
    <audio id="audio-player" controls></audio>
    <button id="close-player" class="close-player" title="Close player">&#10005;</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
